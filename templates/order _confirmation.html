<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Campus Mart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .confirmation-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
        }
        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .order-id {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.2em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="confirmation-card">
                    <div class="success-icon">✅</div>
                    <h1 class="mb-4">Order Confirmed!</h1>
                    <p class="lead mb-4">Thank you for your purchase from Campus Mart!</p>
                    
                    <div class="order-id">
                        Order ID: <strong>{{ order_id }}</strong>
                    </div>
                    
                    <p class="text-muted mb-4">
                        Your order has been successfully placed and is being processed. 
                        You will receive a confirmation email shortly.
                    </p>
                    
                    <div class="d-grid gap-2">
                        <a href="{{ url_for('products') }}" class="btn btn-primary btn-lg">
                            Continue Shopping
                        </a>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                            Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
